{% load static %}

<!-- ============ TOP NAVIGATION (desktop / tablet) ============ -->
<header class="pw-navbar" id="pwNavbar">
  <div class="pw-navbar__inner">

    <!-- Brand -->
    <a class="pw-navbar__brand" href="{% url 'dashboard' %}" aria-label="Predict&amp;Win home">
      <span class="pw-brand-logo" aria-hidden="true">⚽</span>
      <span class="pw-brand-text">
        <span class="pw-brand-text__name">Predict&amp;Win</span>
        <span class="pw-brand-text__sub">Official TechTrix 2026 Event</span>
      </span>
    </a>

    <!-- Center nav (desktop only) -->
    <nav class="pw-navbar__nav" aria-label="Primary">
      <ul class="pw-nav-list" id="pwNavList">
        <li class="pw-nav-item">
          <a href="{% url 'dashboard' %}"
             class="pw-nav-link{% if active_page == 'dashboard' %} is-active{% endif %}"
             {% if active_page == 'dashboard' %}aria-current="page"{% endif %}>
            <svg class="pw-nav-link__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="3" width="7" height="9" rx="1.5"></rect>
              <rect x="14" y="3" width="7" height="5" rx="1.5"></rect>
              <rect x="14" y="12" width="7" height="9" rx="1.5"></rect>
              <rect x="3" y="16" width="7" height="5" rx="1.5"></rect>
            </svg>
            <span class="pw-nav-link__label">Dashboard</span>
          </a>
        </li>
        <li class="pw-nav-item">
          <a href="#"
             class="pw-nav-link{% if active_page == 'analytics' %} is-active{% endif %}"
             {% if active_page == 'analytics' %}aria-current="page"{% endif %}>
            <svg class="pw-nav-link__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 3v18h18"></path>
              <path d="M18.4 8.6 13 14l-3-3-4.6 4.6"></path>
            </svg>
            <span class="pw-nav-link__label">Analytics</span>
          </a>
        </li>
        <li class="pw-nav-item">
          <a href="#"
             class="pw-nav-link{% if active_page == 'leaderboard' %} is-active{% endif %}"
             {% if active_page == 'leaderboard' %}aria-current="page"{% endif %}>
            <svg class="pw-nav-link__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M8 21h8"></path>
              <path d="M12 17v4"></path>
              <path d="M7 4h10v5a5 5 0 0 1-10 0V4Z"></path>
              <path d="M7 5H4a1 1 0 0 0-1 1v1a4 4 0 0 0 4 4"></path>
              <path d="M17 5h3a1 1 0 0 1 1 1v1a4 4 0 0 1-4 4"></path>
            </svg>
            <span class="pw-nav-link__label">Leaderboard</span>
          </a>
        </li>
        <li class="pw-nav-indicator" id="pwNavIndicator" aria-hidden="true"></li>
      </ul>
    </nav>

    <!-- Right: profile -->
    <div class="pw-navbar__right">
      <div class="pw-profile" id="pwProfile">
        <button class="pw-profile__trigger"
                id="pwProfileTrigger"
                type="button"
                aria-haspopup="true"
                aria-expanded="false"
                aria-controls="pwProfileMenu">
          <span class="pw-avatar" aria-hidden="true">
            {% if user.first_name %}{{ user.first_name|slice:":1" }}{{ user.last_name|slice:":1" }}{% else %}RK{% endif %}
          </span>
          <span class="pw-profile__name">
            {% if user.get_full_name %}{{ user.get_full_name }}{% else %}Ram Karan{% endif %}
          </span>
          <svg class="pw-profile__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m6 9 6 6 6-6"></path>
          </svg>
        </button>

        <div class="pw-profile__menu" id="pwProfileMenu" role="menu" aria-hidden="true">
          <a class="pw-profile__menu-item" role="menuitem" href="#">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21a8 8 0 0 0-16 0"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profile</span>
          </a>
          <a class="pw-profile__menu-item" role="menuitem" href="#">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"></path></svg>
            <span>Settings</span>
          </a>
          <div class="pw-profile__menu-divider" role="separator"></div>
          <form method="post" action="{% url 'logout' %}" class="pw-profile__logout-form">
            {% csrf_token %}
            <button class="pw-profile__menu-item pw-profile__menu-item--danger" role="menuitem" type="submit">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><path d="m16 17 5-5-5-5"></path><path d="M21 12H9"></path></svg>
              <span>Logout</span>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- ============ BOTTOM NAVIGATION (mobile / small tablet) ============ -->
<nav class="pw-bottom-nav" aria-label="Primary mobile">
  <a href="{% url 'dashboard' %}"
     class="pw-bottom-nav__item{% if active_page == 'dashboard' %} is-active{% endif %}"
     {% if active_page == 'dashboard' %}aria-current="page"{% endif %}>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="3" y="3" width="7" height="9" rx="1.5"></rect>
      <rect x="14" y="3" width="7" height="5" rx="1.5"></rect>
      <rect x="14" y="12" width="7" height="9" rx="1.5"></rect>
      <rect x="3" y="16" width="7" height="5" rx="1.5"></rect>
    </svg>
    <span>Dashboard</span>
  </a>
  <a href="#"
     class="pw-bottom-nav__item{% if active_page == 'analytics' %} is-active{% endif %}"
     {% if active_page == 'analytics' %}aria-current="page"{% endif %}>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M3 3v18h18"></path>
      <path d="M18.4 8.6 13 14l-3-3-4.6 4.6"></path>
    </svg>
    <span>Analytics</span>
  </a>
  <a href="#"
     class="pw-bottom-nav__item{% if active_page == 'leaderboard' %} is-active{% endif %}"
     {% if active_page == 'leaderboard' %}aria-current="page"{% endif %}>
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M8 21h8"></path>
      <path d="M12 17v4"></path>
      <path d="M7 4h10v5a5 5 0 0 1-10 0V4Z"></path>
      <path d="M7 5H4a1 1 0 0 0-1 1v1a4 4 0 0 0 4 4"></path>
      <path d="M17 5h3a1 1 0 0 1 1 1v1a4 4 0 0 1-4 4"></path>
    </svg>
    <span>Leaderboard</span>
  </a>
</nav>

<link rel="stylesheet" href="{% static 'css/navbar.css' %}">
<script src="{% static 'script/nav.js' %}" defer></script>
