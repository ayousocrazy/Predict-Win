<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>404 Error Predict&Win</title>
  <meta name="description" content="Short description">

  <meta property="og:title" content="Your Website Title">
  <meta property="og:description" content="Short description">
  <meta property="og:image" content="/image.jpg">

  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <text y="52" font-size="52">⚽</text>
  </svg>' />

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">

  <style>

.pw-404{
  --bg:             #F5F6F8;
  --card:           #FFFFFF;
  --primary:        #1877F2;
  --accent:         #2D88FF;
  --border:         #E4E6EB;
  --text:           #1C1E21;
  --text-secondary: #65676B;

  --radius:         22px;
  --radius-sm:      14px;
  --radius-pill:    999px;

  --shadow-sm: 0 2px 8px rgba(24,119,242,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 10px 28px rgba(24,119,242,0.10), 0 2px 8px rgba(0,0,0,0.05);
  --shadow-lg: 0 24px 60px rgba(24,119,242,0.16), 0 6px 16px rgba(0,0,0,0.06);

  --gradient-primary: linear-gradient(135deg, #1877F2 0%, #2D88FF 100%);

  --font-display: 'Sora', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-body:    'Inter', -apple-system, BlinkMacSystemFont, sans-serif;

  --ease: cubic-bezier(0.22, 1, 0.36, 1);

  position:relative;
  min-height:100vh;
  min-height:100dvh;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  overflow:hidden;
  isolation:isolate;
}

.pw-404 *{ box-sizing:border-box; }


.nf-bg{
  position:absolute;
  inset:0;
  z-index:0;
  overflow:hidden;
  pointer-events:none;
}

/* subtle pitch: center circle + halfway line + penalty boxes */
.nf-pitch{
  position:absolute;
  inset:0;
  opacity:0.5;
}

.nf-pitch-line{
  position:absolute;
  border-color:rgba(24,119,242,0.09);
}

.nf-pitch-line--halfway{
  top:0; bottom:0;
  left:50%;
  width:1px;
  background:rgba(24,119,242,0.08);
  transform:translateX(-50%);
}

.nf-pitch-line--circle{
  top:50%; left:50%;
  width:min(46vw, 420px);
  height:min(46vw, 420px);
  border:1px solid rgba(24,119,242,0.09);
  border-radius:50%;
  transform:translate(-50%, -50%);
}

.nf-pitch-line--box-left,
.nf-pitch-line--box-right{
  top:50%;
  width:min(16vw, 160px);
  height:min(30vw, 280px);
  border:1px solid rgba(24,119,242,0.08);
  transform:translateY(-50%);
}
.nf-pitch-line--box-left{ left:-2px; border-left:none; border-radius:0 6px 6px 0; }
.nf-pitch-line--box-right{ right:-2px; border-right:none; border-radius:6px 0 0 6px; }

/* faint moving grass stripes */
.nf-pitch-line--grass{
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    100deg,
    rgba(24,119,242,0.025) 0px,
    rgba(24,119,242,0.025) 60px,
    transparent 60px,
    transparent 120px
  );
  animation:grassDrift 26s linear infinite;
  background-size:200% 100%;
}

@keyframes grassDrift{
  from{ background-position:0% 0; }
  to{ background-position:-200% 0; }
}

/* soft gradient blobs */
.nf-blob{
  position:absolute;
  border-radius:50%;
  filter:blur(50px);
  opacity:0.5;
}
.nf-blob--a{
  width:min(50vw, 480px);
  height:min(50vw, 480px);
  top:-14%;
  right:-10%;
  background:radial-gradient(circle, rgba(24,119,242,0.18), transparent 70%);
  animation:blobFloat 14s ease-in-out infinite;
}
.nf-blob--b{
  width:min(40vw, 380px);
  height:min(40vw, 380px);
  bottom:-16%;
  left:-8%;
  background:radial-gradient(circle, rgba(45,136,255,0.16), transparent 70%);
  animation:blobFloat 18s ease-in-out infinite reverse;
}

@keyframes blobFloat{
  0%, 100%{ transform:translate(0, 0) scale(1); }
  50%{ transform:translate(-16px, 18px) scale(1.06); }
}

/* faint floating football outlines */
.nf-ring{
  position:absolute;
  border-radius:50%;
  border:2px solid rgba(24,119,242,0.10);
  animation:ringFloat 9s ease-in-out infinite;
}
.nf-ring--a{ width:64px; height:64px; top:14%; left:8%; animation-duration:10s; }
.nf-ring--b{ width:36px; height:36px; top:70%; right:12%; animation-duration:8s; animation-delay:.6s; }
.nf-ring--c{ width:46px; height:46px; top:22%; right:20%; animation-duration:11s; animation-delay:1.2s; }

@keyframes ringFloat{
  0%, 100%{ transform:translateY(0) rotate(0deg); }
  50%{ transform:translateY(-22px) rotate(12deg); }
}

/* tiny glowing particles */
.nf-particle{
  position:absolute;
  top:var(--y);
  left:var(--x);
  width:5px;
  height:5px;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 10px 2px rgba(45,136,255,0.55);
  opacity:0;
  animation:particleTwinkle 4.5s ease-in-out infinite;
  animation-delay:var(--delay);
}

@keyframes particleTwinkle{
  0%, 100%{ opacity:0; transform:scale(0.6); }
  50%{ opacity:0.85; transform:scale(1); }
}


.nf-stage{
  position:relative;
  z-index:1;
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:clamp(8px, 3vw, 24px);
  padding:clamp(24px, 6vw, 64px) 20px calc(env(safe-area-inset-bottom, 0px) + 32px);
}

.nf-illustration{
  position:relative;
  width:100%;
  max-width:360px;
  height:clamp(180px, 42vw, 260px);
  display:flex;
  align-items:flex-end;
  justify-content:center;
}

.nf-huge-404{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -55%);
  font-family:var(--font-display);
  font-weight:800;
  font-size:clamp(88px, 26vw, 200px);
  line-height:1;
  letter-spacing:-0.02em;
  color:rgba(24,119,242,0.05);
  -webkit-text-stroke:1.5px rgba(24,119,242,0.14);
  white-space:nowrap;
  user-select:none;
  background:linear-gradient(120deg, rgba(24,119,242,0) 30%, rgba(45,136,255,0.35) 50%, rgba(24,119,242,0) 70%);
  background-size:250% 100%;
  -webkit-background-clip:text;
  background-clip:text;
  animation:shimmer404 5s ease-in-out infinite;
}

@keyframes shimmer404{
  0%{ background-position:150% 0; }
  100%{ background-position:-150% 0; }
}

.nf-goal{
  position:relative;
  width:min(74%, 210px);
  z-index:1;
}
.nf-goal__svg{ width:100%; height:auto; display:block; overflow:visible; }
.nf-goal__net path{
  stroke:rgba(24,119,242,0.16);
}
.nf-goal__frame path{
  fill:none;
  stroke:url(#nfPostGrad);
}
.nf-stop-a{ stop-color:var(--accent); }
.nf-stop-b{ stop-color:var(--primary); }

.nf-ball{
  position:absolute;
  bottom:6px;
  left:50%;
  width:clamp(46px, 13vw, 64px);
  height:clamp(46px, 13vw, 64px);
  z-index:2;
  animation:ballBounce 2.4s var(--ease) infinite;
  transform:translateX(-30px);
}

.nf-ball__svg{
  width:100%;
  height:100%;
  display:block;
  filter:drop-shadow(0 6px 14px rgba(24,119,242,0.45));
}
.nf-stop-light{ stop-color:#EAF2FF; }
.nf-stop-deep{ stop-color:var(--primary); }
.nf-ball__seams path{
  stroke:rgba(255,255,255,0.85);
  stroke-width:1.4;
}
.nf-ball__rim{
  stroke:rgba(255,255,255,0.35);
  stroke-width:1;
}

.nf-ball__shadow{
  position:absolute;
  bottom:-6px;
  left:50%;
  width:70%;
  height:10px;
  background:rgba(24,119,242,0.22);
  border-radius:50%;
  transform:translateX(-50%);
  filter:blur(3px);
  animation:shadowPulse 2.4s var(--ease) infinite;
}

@keyframes ballBounce{
  0%, 100%{ transform:translate(-30px, 0) rotate(0deg); }
  25%{ transform:translate(6px, -58%) rotate(90deg); }
  50%{ transform:translate(40px, 0) rotate(180deg); }
  75%{ transform:translate(6px, -58%) rotate(270deg); }
}
@keyframes shadowPulse{
  0%, 100%{ transform:translateX(-50%) scale(1); opacity:0.55; }
  25%, 75%{ transform:translateX(-50%) scale(0.55); opacity:0.25; }
  50%{ transform:translateX(-50%) scale(1); opacity:0.55; }
}

.nf-light{
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  background:radial-gradient(circle, #fff 0%, var(--accent) 60%, transparent 100%);
  box-shadow:0 0 16px 4px rgba(45,136,255,0.6);
  animation:lightFlicker 3s ease-in-out infinite;
}
.nf-light--a{ top:6%; left:14%; animation-delay:.2s; }
.nf-light--b{ top:10%; right:12%; animation-delay:1s; }

@keyframes lightFlicker{
  0%, 100%{ opacity:0.5; }
  50%{ opacity:1; }
}


.nf-card{
  position:relative;
  z-index:1;
  width:100%;
  max-width:500px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow-lg);
  padding:clamp(28px, 6vw, 40px) clamp(20px, 6vw, 36px);
  text-align:center;
  opacity:0;
  transform:translateY(24px);
  transition:opacity .7s var(--ease), transform .7s var(--ease);
}
.nf-card.is-visible{
  opacity:1;
  transform:translateY(0);
}

.nf-card__badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:rgba(24,119,242,0.08);
  color:var(--primary);
  font-weight:700;
  font-size:12.5px;
  letter-spacing:0.02em;
  padding:6px 14px;
  border-radius:var(--radius-pill);
  margin-bottom:16px;
}

.nf-card__title{
  font-family:var(--font-display);
  font-weight:800;
  font-size:clamp(22px, 5vw, 30px);
  letter-spacing:-0.01em;
  line-height:1.25;
  margin-bottom:12px;
}
.nf-card__title-accent{
  background:var(--gradient-primary);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

.nf-card__subtitle{
  color:var(--text-secondary);
  font-size:clamp(14px, 2.4vw, 15.5px);
  line-height:1.6;
  margin-bottom:26px;
}

.nf-btn{
  position:relative;
  overflow:hidden;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  width:100%;
  min-height:52px;
  padding:0 28px;
  border-radius:var(--radius-pill);
  background:var(--gradient-primary);
  color:#fff;
  font-family:var(--font-display);
  font-weight:700;
  font-size:16px;
  letter-spacing:0.01em;
  text-decoration:none;
  box-shadow:0 10px 28px rgba(24,119,242,0.32);
  transition:transform .18s var(--ease), box-shadow .18s var(--ease), filter .18s var(--ease);
}
.nf-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 16px 36px rgba(24,119,242,0.42);
  filter:brightness(1.03);
}
.nf-btn:active{ transform:translateY(0); }

.nf-btn__icon{
  font-size:18px;
  display:inline-block;
  animation:iconSpin 3.4s linear infinite;
  animation-play-state:paused;
}
.nf-btn:hover .nf-btn__icon{ animation-play-state:running; }

@keyframes iconSpin{
  from{ transform:rotate(0deg); }
  to{ transform:rotate(360deg); }
}

.nf-btn .nf-ripple{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.45);
  transform:scale(0);
  animation:nfRippleAnim .6s var(--ease);
  pointer-events:none;
}
@keyframes nfRippleAnim{
  to{ transform:scale(3); opacity:0; }
}

.nf-card__note{
  margin-top:20px;
  font-size:12.5px;
  color:var(--text-secondary);
  line-height:1.5;
}
.nf-card__note--muted{
  margin-top:4px;
  opacity:0.8;
}

@media (max-width:359px){
  .nf-stage{ padding-top:16px; gap:4px; }
  .nf-illustration{ height:150px; }
}

@media (min-width:768px){
  .nf-stage{ gap:32px; }
  .nf-illustration{ max-width:420px; height:280px; }
}

@media (min-width:1024px){
  .nf-illustration{ max-width:460px; height:300px; }
  .nf-card{ padding:44px 48px; }
}

/* landscape phones: shrink illustration so the card stays reachable */
@media (max-height:480px) and (orientation:landscape){
  .nf-stage{ flex-direction:row; gap:28px; padding-top:20px; padding-bottom:20px; }
  .nf-illustration{ max-width:220px; height:160px; flex-shrink:0; }
  .nf-huge-404{ font-size:64px; }
}


.nf-btn:focus-visible{
  outline:2px solid var(--primary);
  outline-offset:3px;
}

@media (prefers-reduced-motion: reduce){
  .pw-404 *{
    animation-duration:0.001ms !important;
    animation-iteration-count:1 !important;
    transition-duration:0.001ms !important;
  }
}
  </style>

</head>

<body>
  <div class="pw-scope pw-404">

    <!-- ============ AMBIENT BACKGROUND (decorative) ============ -->
    <div class="nf-bg" aria-hidden="true">
      <div class="nf-pitch">
        <span class="nf-pitch-line nf-pitch-line--halfway"></span>
        <span class="nf-pitch-line nf-pitch-line--circle"></span>
        <span class="nf-pitch-line nf-pitch-line--box-left"></span>
        <span class="nf-pitch-line nf-pitch-line--box-right"></span>
        <span class="nf-pitch-line nf-pitch-line--grass"></span>
      </div>

      <span class="nf-blob nf-blob--a" data-parallax="0.02"></span>
      <span class="nf-blob nf-blob--b" data-parallax="0.035"></span>

      <span class="nf-ring nf-ring--a" data-parallax="0.05" aria-hidden="true"></span>
      <span class="nf-ring nf-ring--b" data-parallax="0.07" aria-hidden="true"></span>
      <span class="nf-ring nf-ring--c" data-parallax="0.04" aria-hidden="true"></span>

      <span class="nf-particle" style="--x:12%; --y:18%; --delay:0s;"></span>
      <span class="nf-particle" style="--x:85%; --y:22%; --delay:.6s;"></span>
      <span class="nf-particle" style="--x:20%; --y:78%; --delay:1.2s;"></span>
      <span class="nf-particle" style="--x:78%; --y:72%; --delay:1.8s;"></span>
      <span class="nf-particle" style="--x:92%; --y:50%; --delay:.3s;"></span>
      <span class="nf-particle" style="--x:6%; --y:48%; --delay:1.5s;"></span>
    </div>

    <!-- ============ MAIN STAGE ============ -->
    <main class="nf-stage" role="main">

      <div class="nf-illustration" aria-hidden="true" data-parallax-group>
        <span class="nf-huge-404" data-parallax="0.015">404</span>

        <div class="nf-goal" data-parallax="0.02">
          <svg class="nf-goal__svg" viewBox="0 0 280 170" preserveAspectRatio="xMidYMax meet">
            <defs>
              <linearGradient id="nfPostGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" class="nf-stop-a"></stop>
                <stop offset="100%" class="nf-stop-b"></stop>
              </linearGradient>
            </defs>
            <!-- net grid -->
            <g class="nf-goal__net" stroke-width="1">
              <path d="M18 30 L18 150" />
              <path d="M42 30 L42 150" />
              <path d="M66 30 L66 150" />
              <path d="M90 30 L90 150" />
              <path d="M114 30 L114 150" />
              <path d="M138 30 L138 150" />
              <path d="M18 40 L138 40" />
              <path d="M18 58 L138 58" />
              <path d="M18 76 L138 76" />
              <path d="M18 94 L138 94" />
              <path d="M18 112 L138 112" />
              <path d="M18 130 L138 130" />
            </g>
            <!-- posts -->
            <g class="nf-goal__frame" stroke-width="6" stroke-linecap="round">
              <path d="M14 152 L14 26 L142 26 L142 152" fill="none" />
              <path d="M14 152 L2 166" />
              <path d="M142 152 L154 166" />
            </g>
          </svg>
        </div>

        <div class="nf-ball" id="nfBall">
          <span class="nf-ball__shadow"></span>
          <svg class="nf-ball__svg" viewBox="0 0 64 64">
            <defs>
              <radialGradient id="nfBallGrad" cx="35%" cy="30%" r="75%">
                <stop offset="0%" class="nf-stop-light"></stop>
                <stop offset="100%" class="nf-stop-deep"></stop>
              </radialGradient>
            </defs>
            <circle cx="32" cy="32" r="29" fill="url(#nfBallGrad)" class="nf-ball__body" />
            <g class="nf-ball__seams" fill="none" stroke-linejoin="round" stroke-linecap="round">
              <path d="M32 14 L41 21 L38 32 L26 32 L23 21 Z" />
              <path d="M32 14 L32 6" />
              <path d="M41 21 L48 17" />
              <path d="M38 32 L48 38" />
              <path d="M26 32 L16 38" />
              <path d="M23 21 L16 17" />
              <path d="M38 32 L32 46 L26 32" />
              <path d="M32 46 L32 55" />
            </g>
            <circle cx="32" cy="32" r="29" fill="none" class="nf-ball__rim" />
          </svg>
        </div>

        <span class="nf-light nf-light--a"></span>
        <span class="nf-light nf-light--b"></span>
      </div>

      <section class="nf-card reveal" aria-labelledby="nf-title">
        <span class="nf-card__badge">⚽ Offside</span>

        <h1 class="nf-card__title" id="nf-title">
          Oops! This Page is <span class="nf-card__title-accent">Offside</span>.
        </h1>

        <p class="nf-card__subtitle">
          Looks like the page you're trying to visit has left the field.<br>
          Let's get you back into the game.
        </p>

        <a href="{% url 'landingPage' %}" class="nf-btn" id="nfHomeBtn">
          <span class="nf-btn__icon" aria-hidden="true">⚽</span>
          <span class="nf-btn__label">Return to Home</span>
        </a>

        <p class="nf-card__note">
          You may have entered an incorrect URL or the page has been moved.
        </p>
        <p class="nf-card__note nf-card__note--muted">
          Let's continue your football prediction journey.
        </p>
      </section>

    </main>
  </div>

<script>
(function () {
  'use strict';

  document.addEventListener('DOMContentLoaded', function () {
    initReveal();
    initParallax();
    initButtonRipple();
  });

  function initReveal() {
    var card = document.querySelector('.nf-card');
    if (!card) return;

    // rAF so the transition actually triggers instead of
    // jumping straight to the end state on first paint
    window.requestAnimationFrame(function () {
      window.requestAnimationFrame(function () {
        card.classList.add('is-visible');
      });
    });
  }

  function initParallax() {
    var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var isTouchOnly = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
    if (prefersReduced || isTouchOnly) return;

    var targets = Array.prototype.slice.call(document.querySelectorAll('[data-parallax]'));
    if (!targets.length) return;

    var ticking = false;
    var lastX = 0;
    var lastY = 0;

    window.addEventListener('mousemove', function (e) {
      lastX = (e.clientX / window.innerWidth) - 0.5;
      lastY = (e.clientY / window.innerHeight) - 0.5;

      if (!ticking) {
        ticking = true;
        window.requestAnimationFrame(applyParallax);
      }
    });

    function applyParallax() {
      targets.forEach(function (el) {
        var factor = parseFloat(el.getAttribute('data-parallax')) || 0.02;
        var moveX = lastX * factor * 100;
        var moveY = lastY * factor * 100;
        el.style.transform = 'translate3d(' + moveX + 'px, ' + moveY + 'px, 0)';
      });
      ticking = false;
    }
  }

  function initButtonRipple() {
    var btn = document.getElementById('nfHomeBtn');
    if (!btn) return;

    btn.addEventListener('click', function (e) {
      var rect = btn.getBoundingClientRect();
      var ripple = document.createElement('span');
      var size = Math.max(rect.width, rect.height);

      ripple.className = 'nf-ripple';
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
      ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';

      btn.appendChild(ripple);
      window.setTimeout(function () { ripple.remove(); }, 650);
    });
  }
})();
</script>
</body>
