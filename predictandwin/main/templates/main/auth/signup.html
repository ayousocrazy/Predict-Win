{% extends 'base.html' %}
{% load static %}

{% block content %}
    <style>
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
        }
    </style>

    <h2>Signup</h2>

    {% for message in messages %}
        <p>{{ message }}</p>
    {% endfor %}

    <form method="POST">
        {% csrf_token %}
        {{ signup_form.as_p }}
        <button
            type="submit"
            name="send_otp"
        >
            Next
        </button>
    </form>


    {% if show_otp_modal %}
    <div class="modal">
        <div class="modal-content">
            <h3>Verify OTP</h3>
            <form method="POST">
                {% csrf_token %}
                {{ otp_form.as_p }}
                <button
                    type="submit"
                    name="verify_otp"
                >
                    Verify OTP
                </button>
            </form>
            <br>
            <form method="POST">
                {% csrf_token %}
                <input
                    type="hidden"
                    name="username"
                    value="{{ signup_form.username.value }}"
                >
                <input
                    type="hidden"
                    name="full_name"
                    value="{{ signup_form.full_name.value }}"
                >
                <input
                    type="hidden"
                    name="email"
                    value="{{ signup_form.email.value }}"
                >
                <input
                    type="hidden"
                    name="password"
                    value="{{ signup_form.password.value }}"
                >
                <input
                    type="hidden"
                    name="confirm_password"
                    value="{{ signup_form.confirm_password.value }}"
                >
                <button
                    type="submit"
                    name="send_otp"
                >
                    Resend OTP
                </button>
            </form>
        </div>
    </div>
    {% endif %}
{% endblock content %}
